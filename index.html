<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voula Alpha - $5 to $100 Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Fullscreen Video Background Container */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 1; 
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2); 
            z-index: 1;
        }

        /* Stats Panel Container */
        .stats-wrapper {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 8px;
        }

        .time-frame-label {
            font-size: 0.85rem;
            color: #FFFFFF; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .stats-panel {
            display: flex;
            gap: 40px;
            color: white;
            justify-content: center;
        }

        /* Half-Moon Pricing Badge as Link */
        .pricing-badge {
            position: fixed;
            bottom: 0; 
            left: 50%;
            transform: translateX(-50%);
            background-color: #CCAEE2; 
            color: white;
            padding: 30px 80px 20px 80px; 
            border-radius: 200px 200px 0 0; 
            font-weight: 700;
            font-size: 1.8rem; 
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            z-index: 60;
            letter-spacing: 1px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none; 
        }

        .pricing-badge:hover {
            padding-bottom: 30px; 
            background-color: #b999d4;
        }

        /* Disclaimer Panel */
        .disclaimer-panel {
            position: fixed;
            bottom: 40px;
            left: 40px;
            z-index: 50;
            color: white;
            max-width: 280px; 
        }

        .item-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            padding-left: 20px;
        }

        .item-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10%;
            height: 80%;
            width: 2px;
            background-color: white;
        }

        .label-text {
            font-size: 0.75rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value-text {
            font-size: 2.2rem; 
            font-weight: 700;
            line-height: 1;
        }

        .disclaimer-text {
            font-size: 0.75rem; 
            line-height: 1.5;
            opacity: 0.7;
            font-weight: 400;
        }

        /* Speech Bubble Style */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #000000;
            border-radius: 1.2rem;
            padding: 0.8rem 1.5rem;
            font-size: 1.2rem; 
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: 450px;
            transform-origin: 20% 100%; 
            opacity: 0;
            transform: scale(0) translateY(30px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid #ffffff;
        }

        .speech-bubble.mini {
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
            background: #f8f9fa;
            border: 1px solid #CCAEE2;
        }

        .speech-bubble.cta {
            background: #CCAEE2;
            color: white;
        }
        
        .speech-bubble.cta::after {
            border-top-color: #CCAEE2;
        }

        .speech-bubble.show {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .content-overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bubble-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            padding-bottom: 10%; 
            align-items: flex-start;
        }

        /* --- Mobile Responsive Fixes --- */
        @media (max-width: 768px) {
            .pricing-badge {
                font-size: 1.2rem;
                padding: 20px 40px 15px 40px;
                border-radius: 100px 100px 0 0;
            }

            .stats-wrapper {
                bottom: auto;
                top: 25px; 
                right: 0;
                left: 0;
                width: 100%;
                align-items: center; 
            }

            .time-frame-label {
                font-size: 0.7rem;
                letter-spacing: 3px;
                margin-bottom: 5px;
            }

            .stats-panel {
                justify-content: center;
                width: 100%;
                gap: 20px;
            }

            .disclaimer-panel {
                bottom: 80px; 
                left: 20px;
                right: 20px;
                max-width: none;
                display: flex;
                justify-content: center;
            }

            .value-text {
                font-size: 1.6rem;
            }

            .speech-bubble {
                font-size: 1rem;
                padding: 0.6rem 1rem;
                max-width: 85%;
            }

            .bubble-grid {
                padding-bottom: 25%; 
                width: 100%;
                align-items: center; 
            }
            
            .item-container {
                padding-left: 12px;
                align-items: center;
            }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline preload="auto" class="video-bg" id="bgVideo">
            <source src="voulaalpha.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <!-- Το κουμπί με το Action CTA στα 3$ -->
    <a href="https://selar.com/51555l6229" id="dynamic-pricing" class="pricing-badge" target="_blank">
        Join Challenge — 3-Day Access for $3
    </a>

    <div class="disclaimer-panel">
        <div class="item-container">
            <span class="label-text">Disclaimer</span>
            <p class="disclaimer-text">
                Past performance does not guarantee future results. 
                Trading involves significant risk. 
            </p>
        </div>
    </div>

    <div class="stats-wrapper">
        <div class="time-frame-label">Community Results</div>
        <div class="stats-panel">
            <div class="item-container">
                <span class="label-text">Wins</span>
                <span class="value-text">209</span>
            </div>
            <div class="item-container">
                <span class="label-text">Losses</span>
                <span class="value-text">5</span>
            </div>
        </div>
    </div>

    <div class="content-overlay">
        <div id="bubble-container" class="bubble-grid"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const pricingElement = document.getElementById('dynamic-pricing');
            const bubbleContainer = document.getElementById('bubble-container');

            startBubbles();

            const updatePricing = () => {
                const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                let priceText = "Join Now — 3-Day Access for $3";

                if (timeZone.includes('Africa/Lagos')) {
                    priceText = "Join Now — 3-Day Access for 3,000 NGN";
                } else if (timeZone.includes('Asia/Tokyo')) {
                    priceText = "Join Now — 3-Day Access for 450 JPY";
                } else if (timeZone.includes('Asia/Dubai')) {
                    priceText = "Join Now — 3-Day Access for 11 AED";
                }

                pricingElement.textContent = priceText;
            };
            updatePricing();

            function startBubbles() {
                if (bubbleContainer.children.length > 0) return;

                // Στρατηγική σειρά μηνυμάτων βασισμένη στο νέο κείμενο
                const messages = [
                    { text: "Join the $5 → $100 Private Trading Challenge", type: "headline" },
                    { text: "Only 50 traders per cycle. Once full — access closes.", type: "normal" },
                    { text: "Same balance. Same trades. Same risk.", type: "normal" },
                    { text: "“We all take the same trades. No guessing.”", type: "mini" },
                    { text: "You don’t need more information. You need a system.", type: "normal" },
                    { text: "No late entries. No exceptions.", type: "normal" },
                    { text: "Join Challenge Now", type: "cta" }
                ];

                let initialDelay = 400; 
                let intervalBetween = 2100; // Λίγο περισσότερος χρόνος για να διαβάζονται τα πιο σημαντικά μηνύματα

                messages.forEach((msg, index) => {
                    setTimeout(() => {
                        const bubble = document.createElement('div');
                        bubble.className = 'speech-bubble';
                        
                        if (msg.type === 'mini') {
                            bubble.classList.add('mini');
                        }

                        if (msg.type === 'headline') {
                            bubble.style.border = '2px solid #CCAEE2';
                            bubble.style.fontSize = '1.3rem';
                            bubble.style.backgroundColor = '#fdfaff';
                        }
                        
                        if (msg.type === 'cta') {
                            bubble.classList.add('cta');
                            bubble.style.fontSize = '1.6rem';
                        }
                        
                        bubble.textContent = msg.text;
                        bubbleContainer.appendChild(bubble);

                        requestAnimationFrame(() => {
                            bubble.classList.add('show');
                        });
                    }, initialDelay + (index * intervalBetween));
                });
            }
        });
    </script>
</body>
</html>
