<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voula Alpha - Order Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #000;
            color: white;
        }

        /* Fullscreen Video Background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Εξασφαλίζουμε ότι το βίντεο θα γεμίσει την οθόνη χωρίς κενά */
            background-size: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3); 
            z-index: 1;
        }

        /* Speech Bubbles */
        .bubble-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 20px;
        }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #000000;
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            font-size: 1.2rem; 
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: 480px;
            white-space: pre-line;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
        }

        .bubble-circle-1 { width: 12px; height: 12px; background: white; border-radius: 50%; margin-left: 22px; margin-top: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .bubble-circle-2 { width: 7px; height: 7px; background: white; border-radius: 50%; margin-left: 14px; margin-top: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .bubble-wrapper.show { opacity: 1; transform: scale(1) translateY(0); }
        
        .bubble-wrapper.exit { 
            opacity: 0; 
            transform: scale(0.9) translateY(-30px); 
            transition: all 0.4s ease-in;
            position: absolute;
            width: 100%;
            display: flex;
            align-items: center;
        }

        /* Container for Tally Iframe */
        #raffle-form-container {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            display: none;
            width: 95%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 50px;
            overflow: hidden;
            height: 700px; /* Fixed height for the form scroll */
        }

        #raffle-form-container.reveal {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        .content-area {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        #bubble-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 200px;
            justify-content: center;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .speech-bubble { font-size: 1rem; padding: 1rem 1.5rem; }
            #raffle-form-container { height: 600px; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Προσθήκη preload="auto" και muted playsinline για άμεση εκκίνηση -->
        <video id="bgVideo" autoplay loop muted playsinline preload="auto" class="video-bg">
            <source src="voulaalpha.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="content-area">
        <div id="bubble-container"></div>

        <!-- Raffle Form Container with Tally Embed -->
        <div id="raffle-form-container">
            <iframe 
                src="https://tally.so/embed/ja9JEY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" 
                loading="lazy" 
                title="Raffle Participation Form">
            </iframe>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('bgVideo');
            
            // Επιβολή αναπαραγωγής αν ο browser την μπλοκάρει αρχικά
            if (video) {
                video.play().catch(error => {
                    console.log("Video play was prevented, waiting for interaction.");
                });
            }

            const bubbleContainer = document.getElementById('bubble-container');
            const formContainer = document.getElementById('raffle-form-container');

            const messages = [
                { text: "Congratulations!\nYour order is complete.\nYour e-book has been sent to your email.", type: "headline" },
                { text: "Wait, don’t leave just yet!\nAs a book owner, you are eligible to join\nour Monthly 100-to-1000 Challenge.", type: "normal" },
                { text: "Fill out the form below with the email used for your purchase to enter the raffle on the 1st of the month.", type: "normal" },
                { text: "Good luck and happy studying!", type: "normal" }
            ];

            let currentIndex = 0;

            function showNextMessage() {
                if (currentIndex >= messages.length) {
                    formContainer.style.display = 'block';
                    setTimeout(() => formContainer.classList.add('reveal'), 100);
                    return;
                }

                const msg = messages[currentIndex];
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';

                const bubble = document.createElement('div');
                bubble.className = 'speech-bubble';
                if (msg.type === 'headline') {
                    bubble.style.border = '2px solid #CCAEE2';
                    bubble.style.backgroundColor = '#fdfaff';
                }
                bubble.textContent = msg.text;
                
                wrapper.appendChild(bubble);
                const c1 = document.createElement('div'); c1.className = 'bubble-circle-1';
                const c2 = document.createElement('div'); c2.className = 'bubble-circle-2';
                wrapper.appendChild(c1);
                wrapper.appendChild(c2);

                bubbleContainer.appendChild(wrapper);
                requestAnimationFrame(() => wrapper.classList.add('show'));

                const duration = msg.text.length > 50 ? 4000 : 3000;

                if (currentIndex < messages.length - 1) {
                    setTimeout(() => {
                        wrapper.classList.add('exit');
                        setTimeout(() => {
                            wrapper.remove();
                            currentIndex++;
                            showNextMessage();
                        }, 500);
                    }, duration);
                } else {
                    setTimeout(() => {
                        currentIndex++;
                        showNextMessage();
                    }, 2500);
                }
            }

            // Ξεκινάμε τα μηνύματα αφού φορτώσει η σελίδα
            showNextMessage();
        });
    </script>
</body>
</html>
