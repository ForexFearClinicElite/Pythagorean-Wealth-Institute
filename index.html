<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voula Alpha - Order Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #000;
            color: white;
        }

        /* Fullscreen Video Background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background-color: #000;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3); 
            z-index: 1;
        }

        /* Speech Bubbles */
        .bubble-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 20px;
        }

        .speech-bubble {
            position: relative;
            background: #ffffff;
            color: #000000;
            border-radius: 1.5rem;
            padding: 1.2rem 2rem;
            font-size: 1.2rem; 
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            max-width: 480px;
            white-space: pre-line;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 30px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
        }

        .bubble-circle-1 { width: 12px; height: 12px; background: white; border-radius: 50%; margin-left: 22px; margin-top: 4px; }
        .bubble-circle-2 { width: 7px; height: 7px; background: white; border-radius: 50%; margin-left: 14px; margin-top: 4px; }

        .bubble-wrapper.show { opacity: 1; transform: scale(1) translateY(0); }
        .bubble-wrapper.exit { opacity: 0; transform: scale(0.9) translateY(-20px); position: absolute; }

        /* Form Styling */
        #raffle-form-container {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
            display: none;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 50px;
        }

        #raffle-form-container.reveal {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        input, label { display: block; width: 100%; }
        
        input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            padding: 0.8rem;
            color: white;
            margin-bottom: 1rem;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: #CCAEE2; }

        input::placeholder { color: rgba(255, 255, 255, 0.4); font-size: 0.9rem; }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .submit-btn {
            background: #CCAEE2;
            color: white;
            font-weight: 700;
            padding: 1rem;
            border-radius: 1rem;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .submit-btn:active { transform: scale(0.98); }

        .content-area {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
            position: relative;
        }

        @media (max-width: 768px) {
            .speech-bubble { font-size: 1rem; padding: 1rem 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video autoplay loop muted playsinline class="video-bg">
            <source src="voulaalpha.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="content-area">
        <div id="bubble-container"></div>

        <!-- Raffle Form -->
        <div id="raffle-form-container">
            <h2 class="text-2xl font-bold mb-6 text-center" style="color: #CCAEE2;">Enter the Raffle</h2>
            
            <form id="raffle-form" onsubmit="event.preventDefault(); alert('Participation Confirmed!');">
                <label class="form-label">Full Name *</label>
                <input type="text" placeholder="Your name and surname" required>

                <label class="form-label">Email Address *</label>
                <input type="email" placeholder="Email used for purchase" required>

                <label class="form-label">Order ID *</label>
                <input type="text" placeholder="Order number from receipt" required>

                <label class="form-label">TikTok Username (Optional)</label>
                <input type="text" placeholder="@yourusername">

                <label class="form-label">Proof of Purchase (Optional)</label>
                <input type="file" class="text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-white file:text-black hover:file:bg-gray-100">

                <button type="submit" class="submit-btn">Confirm Participation</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bubbleContainer = document.getElementById('bubble-container');
            const formContainer = document.getElementById('raffle-form-container');

            const messages = [
                { text: "Congratulations!\nYour order is complete.\nYour e-book has been sent to your email.", type: "headline" },
                { text: "Wait, don’t leave just yet!\nAs a book owner, you are eligible to join\nour Monthly 100-to-1000 Challenge.", type: "normal" },
                { text: "Fill out the form below with the email used for your purchase to enter the raffle on the 1st of the month.", type: "normal" },
                { text: "Good luck and happy studying!", type: "normal" }
            ];

            let currentIndex = 0;

            function showNextMessage() {
                if (currentIndex >= messages.length) {
                    formContainer.style.display = 'block';
                    setTimeout(() => formContainer.classList.add('reveal'), 100);
                    return;
                }

                const msg = messages[currentIndex];
                const wrapper = document.createElement('div');
                wrapper.className = 'bubble-wrapper';

                const bubble = document.createElement('div');
                bubble.className = 'speech-bubble';
                if (msg.type === 'headline') {
                    bubble.style.border = '2px solid #CCAEE2';
                    bubble.style.backgroundColor = '#fdfaff';
                }
                bubble.textContent = msg.text;
                wrapper.appendChild(bubble);
                
                wrapper.innerHTML += `<div class="bubble-circle-1"></div><div class="bubble-circle-2"></div>`;
                bubbleContainer.appendChild(wrapper);

                requestAnimationFrame(() => wrapper.classList.add('show'));

                const duration = msg.text.length > 50 ? 3500 : 2500;

                if (currentIndex < messages.length - 1) {
                    setTimeout(() => {
                        wrapper.classList.add('exit');
                        setTimeout(() => {
                            wrapper.remove();
                            currentIndex++;
                            showNextMessage();
                        }, 500);
                    }, duration);
                } else {
                    setTimeout(() => {
                        currentIndex++;
                        showNextMessage();
                    }, 2000);
                }
            }

            showNextMessage();
        });
    </script>
</body>
</html>
